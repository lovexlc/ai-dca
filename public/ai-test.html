<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light only" />
    <title>AI 功能测试</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --panel: #ffffff;
        --text: #111827;
        --muted: #6b7280;
        --line: #e5e7eb;
        --blue: #2563eb;
        --blue-dark: #1d4ed8;
        --green: #059669;
        --red: #dc2626;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      main {
        width: min(960px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 24px 0 40px;
      }
      header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }
      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.2;
        letter-spacing: 0;
      }
      p {
        margin: 6px 0 0;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }
      a {
        color: var(--blue);
        text-decoration: none;
      }
      a:hover { text-decoration: underline; }
      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: var(--panel);
        box-shadow: 0 10px 30px rgba(15, 23, 42, 0.06);
      }
      .form {
        display: grid;
        gap: 14px;
        padding: 16px;
      }
      label {
        display: grid;
        gap: 6px;
        color: #374151;
        font-size: 13px;
        font-weight: 700;
      }
      input,
      textarea {
        width: 100%;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--text);
        font: inherit;
        font-size: 14px;
        outline: none;
      }
      input {
        height: 40px;
        padding: 0 12px;
      }
      textarea {
        min-height: 132px;
        resize: vertical;
        padding: 12px;
        line-height: 1.6;
      }
      input:focus,
      textarea:focus {
        border-color: #93c5fd;
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.12);
      }
      .row {
        display: grid;
        gap: 12px;
      }
      @media (min-width: 720px) {
        .row { grid-template-columns: 1fr 180px; }
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
      }
      button {
        min-height: 40px;
        border: 0;
        border-radius: 8px;
        padding: 0 14px;
        font: inherit;
        font-size: 14px;
        font-weight: 800;
        cursor: pointer;
      }
      button.primary {
        background: var(--blue);
        color: white;
      }
      button.primary:hover { background: var(--blue-dark); }
      button.secondary {
        border: 1px solid var(--line);
        background: white;
        color: #374151;
      }
      button:disabled {
        cursor: not-allowed;
        opacity: 0.62;
      }
      .status {
        display: inline-flex;
        min-height: 28px;
        align-items: center;
        gap: 8px;
        border-radius: 999px;
        background: #f3f4f6;
        padding: 0 10px;
        color: #4b5563;
        font-size: 12px;
        font-weight: 800;
      }
      .status.ok { background: #ecfdf5; color: var(--green); }
      .status.err { background: #fef2f2; color: var(--red); }
      .output {
        min-height: 220px;
        border-top: 1px solid var(--line);
        padding: 16px;
        white-space: pre-wrap;
        color: #111827;
        font-size: 14px;
        line-height: 1.7;
      }
      .log {
        margin-top: 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #111827;
        color: #d1d5db;
        padding: 12px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
        font-size: 12px;
        line-height: 1.6;
        white-space: pre-wrap;
        overflow-x: auto;
      }
      .hint {
        margin-top: 10px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <div>
          <h1>AI 功能测试</h1>
          <p>独立测试 Puter.js 可选 AI 通道，不依赖主应用状态。</p>
        </div>
        <a href="./index.html">返回应用</a>
      </header>

      <section class="panel">
        <div class="form">
          <div class="row">
            <label>
              模型
              <input id="model" value="gemini-2.5-flash-lite" list="model-list" />
              <datalist id="model-list"></datalist>
            </label>
            <label>
              超时秒数
              <input id="timeout" type="number" min="5" max="120" step="1" value="30" />
            </label>
          </div>
          <label>
            Prompt
            <textarea id="prompt">用中文回答：请用 3 条要点说明 AI-DCA 的投资记录助手可以怎样帮助我。</textarea>
          </label>
          <div class="actions">
            <button id="auth" type="button" class="secondary">检查登录</button>
            <button id="models" type="button" class="secondary">列出模型</button>
            <button id="run" type="button" class="primary">运行测试</button>
            <button id="clear" type="button" class="secondary">清空输出</button>
            <span id="status" class="status">未运行</span>
          </div>
          <div class="hint">Puter.js 是用户自付模式。若未登录或模型不可用，主应用会切换到备用服务；这个页面用于单独确认 Puter 账号和模型状态。</div>
        </div>
        <div id="output" class="output">输出会显示在这里。</div>
      </section>

      <div id="log" class="log">log: ready</div>
    </main>

    <script>
      const PUTER_SCRIPT_URL = 'https://js.puter.com/v2/';
      const els = {
        model: document.getElementById('model'),
        modelList: document.getElementById('model-list'),
        prompt: document.getElementById('prompt'),
        timeout: document.getElementById('timeout'),
        auth: document.getElementById('auth'),
        models: document.getElementById('models'),
        run: document.getElementById('run'),
        clear: document.getElementById('clear'),
        status: document.getElementById('status'),
        output: document.getElementById('output'),
        log: document.getElementById('log')
      };

      function setStatus(text, tone) {
        els.status.textContent = text;
        els.status.className = 'status' + (tone ? ' ' + tone : '');
      }

      function log(line) {
        const time = new Date().toLocaleTimeString('zh-CN', { hour12: false });
        els.log.textContent += '\\n' + time + ' ' + line;
      }

      function getPuter() {
        return window.puter && window.puter.ai && typeof window.puter.ai.chat === 'function'
          ? window.puter
          : null;
      }

      function loadPuter() {
        const existing = getPuter();
        if (existing) return Promise.resolve(existing);
        return new Promise((resolve, reject) => {
          const script = document.createElement('script');
          script.src = PUTER_SCRIPT_URL;
          script.async = true;
          script.onload = () => {
            const startedAt = Date.now();
            const timer = window.setInterval(() => {
              const puter = getPuter();
              if (puter) {
                window.clearInterval(timer);
                resolve(puter);
                return;
              }
              if (Date.now() - startedAt > 8000) {
                window.clearInterval(timer);
                reject(new Error('Puter.js 已加载，但 puter.ai.chat 未就绪'));
              }
            }, 100);
          };
          script.onerror = () => reject(new Error('Puter.js 加载失败'));
          document.head.appendChild(script);
        });
      }

      function withTimeout(promise, ms) {
        return Promise.race([
          promise,
          new Promise((_, reject) => window.setTimeout(() => reject(new Error('请求超时')), ms))
        ]);
      }

      function readText(part) {
        if (typeof part === 'string') return part;
        if (!part || typeof part !== 'object') return '';
        const content = part.message?.content;
        if (Array.isArray(content)) {
          const text = content.map((item) => typeof item === 'string' ? item : item?.text || item?.content || '').join('');
          if (text) return text;
        }
        if (typeof content === 'string') return content;
        if (part.choices?.[0]?.message?.content) return part.choices[0].message.content;
        if (part.output?.[0]?.content?.[0]?.text) return part.output[0].content[0].text;
        if (part.output_text) return part.output_text;
        if (part.text || part.delta || part.response || part.answer) return part.text || part.delta || part.response || part.answer;
        if (typeof part.toString === 'function' && part.toString !== Object.prototype.toString) {
          const text = part.toString();
          if (text && text !== '[object Object]') return text;
        }
        return '';
      }

      async function checkAuth() {
        els.auth.disabled = true;
        setStatus('检查登录', '');
        try {
          const puter = await withTimeout(loadPuter(), 10000);
          if (!puter.auth || typeof puter.auth.isSignedIn !== 'function') {
            setStatus('SDK 无登录接口', 'err');
            log('auth api unavailable');
            return false;
          }
          const signedIn = await puter.auth.isSignedIn();
          if (signedIn) {
            setStatus('Puter 已登录', 'ok');
            log('auth signed in');
            return true;
          }
          setStatus('Puter 未登录', 'err');
          log('auth not signed in');
          if (typeof puter.auth.signIn === 'function') {
            await puter.auth.signIn();
            const nextSignedIn = await puter.auth.isSignedIn();
            setStatus(nextSignedIn ? 'Puter 已登录' : 'Puter 未登录', nextSignedIn ? 'ok' : 'err');
            log('auth signIn result=' + nextSignedIn);
            return nextSignedIn;
          }
          return false;
        } catch (error) {
          const message = error && error.message ? error.message : String(error);
          setStatus('登录检查失败', 'err');
          log('auth error ' + message);
          return false;
        } finally {
          els.auth.disabled = false;
        }
      }

      function pickDefaultModel(models) {
        const ids = models.map((model) => String(model.id || model.name || '').trim()).filter(Boolean);
        const preferred = ['gpt-5.4-nano', 'gemini-2.5-flash-lite', 'gpt-5.4-mini', 'claude-3-5-haiku', 'claude-sonnet-4-5'];
        return preferred.find((id) => ids.includes(id)) || ids.find((id) => /nano|flash-lite|mini|haiku/i.test(id)) || ids[0] || els.model.value.trim();
      }

      async function listModels() {
        els.models.disabled = true;
        setStatus('获取模型', '');
        try {
          const puter = await withTimeout(loadPuter(), 10000);
          if (typeof puter.ai.listModels !== 'function') {
            throw new Error('当前 Puter SDK 没有 listModels 接口');
          }
          const models = await withTimeout(puter.ai.listModels(), 10000);
          const list = Array.isArray(models) ? models : [];
          els.modelList.innerHTML = '';
          for (const model of list.slice(0, 80)) {
            const id = String(model.id || model.name || '').trim();
            if (!id) continue;
            const option = document.createElement('option');
            option.value = id;
            els.modelList.appendChild(option);
          }
          const selected = pickDefaultModel(list);
          if (selected) els.model.value = selected;
          els.output.textContent = JSON.stringify(list.slice(0, 20), null, 2);
          setStatus('模型已获取', 'ok');
          log('models count=' + list.length + ' selected=' + selected);
        } catch (error) {
          const message = error && error.message ? error.message : String(error);
          setStatus('模型获取失败', 'err');
          els.output.textContent = '模型列表获取失败：' + message;
          log('models error ' + message);
        } finally {
          els.models.disabled = false;
        }
      }

      async function runTest() {
        const prompt = els.prompt.value.trim();
        const model = els.model.value.trim() || 'gemini-2.5-flash-lite';
        const timeoutMs = Math.max(5, Number(els.timeout.value) || 30) * 1000;
        if (!prompt) {
          setStatus('请输入 prompt', 'err');
          return;
        }

        els.run.disabled = true;
        els.output.textContent = '';
        setStatus('加载 Puter.js', '');
        log('loading Puter.js');

        try {
          const puter = await withTimeout(loadPuter(), 10000);
          if (puter.auth && typeof puter.auth.isSignedIn === 'function') {
            const signedIn = await puter.auth.isSignedIn();
            if (!signedIn) throw new Error('Puter 未登录，请先点击“检查登录”。');
          }
          setStatus('等待响应', '');
          log('calling puter.ai.chat model=' + model);
          const result = await withTimeout(puter.ai.chat(prompt, { model, stream: true }), timeoutMs);
          let text = '';

          if (result && typeof result[Symbol.asyncIterator] === 'function') {
            for await (const part of result) {
              const delta = readText(part);
              if (!delta) continue;
              text += delta;
              els.output.textContent = text;
            }
          } else {
            text = readText(result);
            els.output.textContent = text || JSON.stringify(result, null, 2);
          }

          if (!els.output.textContent.trim()) {
            throw new Error('模型返回空内容');
          }
          setStatus('成功', 'ok');
          log('done chars=' + els.output.textContent.length);
        } catch (error) {
          const message = error && error.message ? error.message : String(error);
          setStatus('失败', 'err');
          els.output.textContent = '请求失败：' + message;
          log('error ' + message);
        } finally {
          els.run.disabled = false;
        }
      }

      els.auth.addEventListener('click', checkAuth);
      els.models.addEventListener('click', listModels);
      els.run.addEventListener('click', runTest);
      els.clear.addEventListener('click', () => {
        els.output.textContent = '';
        els.log.textContent = 'log: cleared';
        setStatus('未运行', '');
      });
    </script>
  </body>
</html>
