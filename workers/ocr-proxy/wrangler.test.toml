name = "ai-dca-ocr-proxy-test"
main = "src/index.js"
workers_dev = false
compatibility_date = "2026-03-26"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "test.freebacktrack.tech/api/*"
zone_name = "freebacktrack.tech"

[ai]
binding = "AI"

[[services]]
binding = "MARKETS"
service = "ai-dca-markets-test"

# Isolated fund-limit + nav-history from production.
[[kv_namespaces]]
binding = "FUND_LIMIT_KV"
id = "94fa5584f99945ab8c501394920609ee"

[[kv_namespaces]]
binding = "NAV_HISTORY_KV"
id = "f57be616712143108cb05799f30d1bc6"

# Separate Vectorize index (empty until KB build targets test).
[[vectorize]]
binding = "KNOWLEDGE_INDEX"
index_name = "ai-dca-kb-v2-test"

# No daily fund-limit cron on test (refresh on demand / manual).

[vars]
OCR_MODEL = "@cf/moonshotai/kimi-k2.6"
OCR_MAX_TOKENS = "4096"
EMBED_MODEL = "@cf/baai/bge-m3"
EMBED_DIMENSIONS = "1024"
