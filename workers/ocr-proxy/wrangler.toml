name = "ai-dca-ocr-proxy"
main = "src/index.js"
compatibility_date = "2026-03-26"
# Workers AI 客户端依赖 Node 兼容层。
compatibility_flags = ["nodejs_compat"]

# 单条 route 即可。
[[routes]]
pattern = "tools.freebacktrack.tech/api/*"
zone_name = "freebacktrack.tech"

# Cloudflare Workers AI 绑定。代码里通过 env.AI.run(model, input) 调用。
# 计费：Workers Paid 套餐每天包含 10,000 neurons 免费额度，超出按
# $0.011 / 1k neurons 计算。Llama 3.2 11B Vision 单张图大约 30~80 neurons。
[ai]
binding = "AI"

# Smart Placement：Workers AI 走的是 Cloudflare 内部网络，对 placement 不敏感，
# 但同一 worker 还会回源东方财富 / 净值接口（境外），保留 smart 让整体调度更优。
[placement]
mode = "smart"

# OCR 输入图片可能较大、Workers AI 推理也可能较长。Paid 套餐允许拉到 5 分钟。
[limits]
cpu_ms = 300000

# Workers Logs + traces 全部打开（Paid 套餐内置）。
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
head_sampling_rate = 1
persist = true

[vars]
# OCR 视觉模型，可换成 @cf/llava-hf/llava-1.5-7b-hf（更便宜更小）等。
OCR_MODEL = "@cf/moonshotai/kimi-k2.6"
# 单次 OCR 推理最多生成的 token 数。
# 结构化 JSON 输出（多行 rows + 多字段）容易在 1500 内被截断，
# 表现为 finish_reason="length"、客户端拿到不完整 JSON、Worker 报
# “没有返回可解析的 JSON 文本”。kimi-k2.6 支持很大的输出窗口，
# 这里默认放到 4096；如果需要更多行可以再调到 8192。
OCR_MAX_TOKENS = "4096"

# fund-limit 接口的 KV 缓存。
# - key 形态：limit:<6位基金代码>
# - 默认 TTL 600s（10 分钟）。可在 Dashboard 里把 FUND_LIMIT_CACHE_TTL_SECONDS 调到
#   300~900；下午 3 点公告窗后老缓存可能滞后，前端可带 ?refresh=1 强刷。
# - QDII / Y 类等天天基金未代销的产品，整段「金额」会拿不到，但状态徽章仍可用。
[[kv_namespaces]]
binding = "FUND_LIMIT_KV"
id = "633d193bdcb045e3bdbc098ff6249224"
preview_id = "1892e345c6754009ac678ce467189ef2"
