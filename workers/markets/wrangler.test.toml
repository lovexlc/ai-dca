name = "ai-dca-markets-test"
main = "src/index.js"
workers_dev = true
compatibility_date = "2026-05-12"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "test.freebacktrack.tech/api/markets/*"
zone_name = "freebacktrack.tech"

[ai]
binding = "AI"

[[services]]
binding = "AGENT"
service = "ai-dca-markets-agent"

[vars]
CHAT_MODEL_FAST = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
CHAT_MODEL_DEEP = "@cf/qwen/qwq-32b"
CHAT_MAX_TOKENS = "2048"
TAVILY_ENDPOINT = "https://api.tavily.com/search"
FINNHUB_BASE = "https://finnhub.io/api/v1"
MARKETS_DATA_READ_MODE = "cache-first"

[[kv_namespaces]]
binding = "MARKETS_KV"
id = "604823eb1497431bb8a13f895a0d68e3"

[[kv_namespaces]]
binding = "NAV_HISTORY_KV"
id = "1537be1895404cc4a8286ae2aead9d52"

[[r2_buckets]]
binding = "MARKETS_R2"
bucket_name = "ai-dca-markets"
