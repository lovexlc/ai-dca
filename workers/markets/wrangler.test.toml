name = "ai-dca-markets-test"
main = "src/index.js"
workers_dev = false
compatibility_date = "2026-05-12"
compatibility_flags = ["nodejs_compat"]

# Fully isolated test stack: separate KV + R2 from production.
# Light crons only (after-close kline batch). No per-minute quote warmup.

[[routes]]
pattern = "test.freebacktrack.tech/api/markets/*"
zone_name = "freebacktrack.tech"

[ai]
binding = "AI"

# Deep research container is shared (expensive to duplicate). Agent has no
# durable markets state; markets R2/KV isolation is the hard boundary.
[[services]]
binding = "AGENT"
service = "ai-dca-markets-agent"

[vars]
CHAT_MODEL_FAST = "@cf/meta/llama-3.3-70b-instruct-fp8-fast"
CHAT_MODEL_DEEP = "@cf/qwen/qwq-32b"
CHAT_MAX_TOKENS = "2048"
TAVILY_ENDPOINT = "https://api.tavily.com/search"
FINNHUB_BASE = "https://finnhub.io/api/v1"
MARKETS_DATA_READ_MODE = "cache-first"

# Light schedule: only CN after-close kline batch to test R2.
[triggers]
crons = [
  "30 7 * * MON-FRI"    # CN after-close kline batch → test R2 (only kline writer)
]

[[kv_namespaces]]
binding = "MARKETS_KV"
id = "05875f31d61c42d187e9921170579fa2"

[[kv_namespaces]]
binding = "NAV_HISTORY_KV"
id = "f57be616712143108cb05799f30d1bc6"

[[r2_buckets]]
binding = "MARKETS_R2"
bucket_name = "ai-dca-markets-test"
