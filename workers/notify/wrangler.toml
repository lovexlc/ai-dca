name = "ai-dca-notify"
main = "src/index.js"
compatibility_date = "2026-03-30"
# Workers Paid 套餐已启用：开启 nodejs_compat 让后续可以直接用 Node 内置库
# （JWT 签名、buffer 等），避免再手写 base64/HMAC。
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "tools.freebacktrack.tech/api/notify*"
zone_name = "freebacktrack.tech"

[[kv_namespaces]]
binding = "NOTIFY_STATE"
id = "d3d7cf8351b24070a156649fdd50790d"
preview_id = "0b6670c7493642ca9b69bc29672dcb46"

[triggers]
# Cloudflare cron uses UTC.
# 触发设计原则：只在真正有业务事件的时刻触发，不再 24h 每 30 分钟空跑 runDetection。
#   - 15:30 (UTC 07:30) Beijing —— A 股收盘后：runDetection (DCA 检测) + runHoldingsNotifications('exchange')
#   - 20:30 (UTC 12:30) Beijing —— 场外基金净值出来：runDetection 兜底 + runHoldingsNotifications('otc')
#   - 21:30 (UTC 13:30) Beijing —— 场外基金兜底：runDetection 兜底 + runHoldingsNotifications('otc')
#   - * 1-7 MON-FRI (UTC) = Beijing 09:00-15:59 工作日每分钟 —— 场内切换策略 tick；
#     handler 内再用 isInTradingSession 过滤 09:30-11:30 / 13:00-15:00 真交易时段。
#   - 23:35 (UTC 15:35) Beijing —— 临时测试时刻：bypass dedup 触发一次 runHoldingsNotificationsAll，
#     便于用户在晚上 23:35 验证全仓总览推送。验证完成后移除该 cron + 对应 dispatch 分支。
# scheduled handler 已经按 hhmm 命中三个固定时刻分发 holdings，无需手动改 dispatch 逻辑。
crons = [
  "30 7 * * MON-FRI",
  "30 12 * * MON-FRI",
  "30 13 * * MON-FRI",
  "* 1-7 * * MON-FRI",
  "35 15 * * *"
]

# Workers Paid 解锁的 Smart Placement：让 worker 自动靠近上游（FCM、新浪、东财、PUBLIC_DATA_BASE_URL），
# 减少跨洲 round-trip。对 cron 高频 fan-out 帮助最大，且不收额外费用。
[placement]
mode = "smart"

# Workers Paid CPU 上限可以拉到 5 分钟（默认 30s）。cron 一次会扫所有 client 做
# 持仓收益计算 + FCM fan-out，留足缓冲避免被 1006 cpu_exceeded 截断。
[limits]
cpu_ms = 300000

# Workers Logs（Paid 套餐内置，零额外费用）：日志保留 7 天，便于事后排查 FCM/Bark 推送
# 失败、KV 写入异常等问题。invocation_logs 记录每次 cron tick 的入口/出口。
[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

# Service binding to ocr-proxy worker. Calls /api/holdings/nav directly via
# env.OCR_PROXY.fetch(...) without going through the public hostname.
# Avoids same-zone worker→worker 405 caused by route collision on
# tools.freebacktrack.tech/api/* (notify and ocr-proxy share the zone).
[[services]]
binding = "OCR_PROXY"
service = "ai-dca-ocr-proxy"

# WsHub Durable Object：实时长连接通道。
# 每个 deviceInstallationId 一个 instance，承载在线即推 + ping/pong。
[[durable_objects.bindings]]
name = "WS_HUB"
class_name = "WsHub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["WsHub"]

[vars]
PUBLIC_DATA_BASE_URL = "https://tools.freebacktrack.tech"
NOTIFY_TIMEZONE = "Asia/Shanghai"
ADMIN_TEST_TOKEN = "admintest"
