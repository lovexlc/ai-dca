name = "ai-dca-notify-test"
main = "src/index.js"
workers_dev = false
compatibility_date = "2026-03-30"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "test.freebacktrack.tech/api/notify*"
zone_name = "freebacktrack.tech"

[[routes]]
pattern = "test.freebacktrack.tech/api/wechat*"
zone_name = "freebacktrack.tech"

# Isolated from production NOTIFY_STATE.
[[kv_namespaces]]
binding = "NOTIFY_STATE"
id = "b7895ed7d785422683a5be18c40370ad"

[[services]]
binding = "OCR_PROXY"
service = "ai-dca-ocr-proxy-test"

[[services]]
binding = "MARKETS"
service = "ai-dca-markets-test"

[[durable_objects.bindings]]
name = "WS_HUB"
class_name = "WsHub"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["WsHub"]

[vars]
PUBLIC_DATA_BASE_URL = "https://test.freebacktrack.tech"
NOTIFY_TIMEZONE = "Asia/Shanghai"
QUANT_BACKTEST_DAILY_LIMIT = "100"
QUANT_BACKTEST_IP_HOURLY_LIMIT = "50"
MARKETS_DATA_READ_MODE = "cache-first"
MARKETS_WS_DATA_READ_MODE = "cache-first"

# Light crons: holdings / detection windows only. No per-minute WS fan-out
# (avoids burning account CPU + accidental prod-like push volume on test).
[triggers]
crons = [
  "30 7 * * MON-FRI",
  "30 12 * * MON-FRI",
  "30 13 * * MON-FRI"
]
