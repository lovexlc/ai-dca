name = "test-ai-dca-sync"
main = "src/index.js"
compatibility_date = "2026-03-30"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "api.freebacktrack.tech/test/api/sync/*"
zone_name = "freebacktrack.tech"

# 测试 Worker 复用生产账号数据存储，路径和 Worker 名称隔离；测试页面仍使用
# 当前账号登录体系，方便验证新同步逻辑，但不会接管生产 /api/sync 路由。
[[d1_databases]]
binding = "DB"
database_name = "ai-dca-sync-db"
database_id = "b0e5feab-dbcf-4ba7-9f3f-2e5169e8d868"

[[kv_namespaces]]
binding = "SYNC_BACKUPS"
id = "34af9b7435a84b5290e179875d272f27"
preview_id = "577dcaf0493642ca9b69bc29672dcb46"

[placement]
mode = "smart"

[observability]
enabled = true
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true
