name = "ai-dca-sync-test"
main = "src/index.js"
workers_dev = false
compatibility_date = "2026-03-30"
compatibility_flags = ["nodejs_compat"]

[[routes]]
pattern = "test.freebacktrack.tech/api/sync/*"
zone_name = "freebacktrack.tech"

# Isolated D1 + backup KV (schema created at runtime by sync worker).
[[d1_databases]]
binding = "DB"
database_name = "ai-dca-sync-db-test"
database_id = "da62dd9c-868c-479e-86f0-cf3fbe8d421f"

[[kv_namespaces]]
binding = "SYNC_BACKUPS"
id = "8da78a6acccb4025adae5101ca3fbf13"

[placement]
mode = "smart"
