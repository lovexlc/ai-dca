name: Deploy HK Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'scripts/check_refactor_guard.mjs'
      - '.github/workflows/deploy-hk-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: hk-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://freebacktrack.tech

    env:
      HK_HOST: 189.1.226.131
      HK_USER: root
      HK_TARGET_DIR: /var/www/ai-dca-hk
      HK_RELEASES_DIR: /var/www/ai-dca-releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check refactor guard
        run: npm run check:refactor

      - name: Build frontend
        run: npm run build:app
        env:
          VITE_POSTHOG_API_KEY: ${{ secrets.VITE_POSTHOG_API_KEY }}
          VITE_POSTHOG_HOST: https://us.i.posthog.com

      - name: Package frontend
        run: tar -C .frontend-build -czf /tmp/ai-dca-frontend.tgz .

      - name: Configure SSH
        env:
          HK_SSH_KEY: ${{ secrets.HK_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$HK_HOST"
          test -n "$HK_USER"
          test -n "$HK_SSH_KEY"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$HK_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$HK_HOST" >> ~/.ssh/known_hosts

      - name: Upload artifact
        run: scp /tmp/ai-dca-frontend.tgz "$HK_USER@$HK_HOST:/tmp/ai-dca-frontend.tgz"

      - name: Deploy on HK host
        run: |
          set -euo pipefail
          ssh "$HK_USER@$HK_HOST" \
            "HK_TARGET_DIR='$HK_TARGET_DIR' HK_RELEASES_DIR='$HK_RELEASES_DIR' bash -s" <<'REMOTE'
          set -euo pipefail
          stamp=$(date +%Y%m%d%H%M%S)
          release="$HK_RELEASES_DIR/$stamp"

          install -d -m 755 "$HK_RELEASES_DIR"
          install -d -m 755 "$release"
          tar -xzf /tmp/ai-dca-frontend.tgz -C "$release"

          if id www-data >/dev/null 2>&1; then
            chown -R www-data:www-data "$release"
          fi

          if [ -d "$HK_TARGET_DIR" ] && [ ! -L "$HK_TARGET_DIR" ]; then
            mv "$HK_TARGET_DIR" "$HK_TARGET_DIR.backup.$stamp"
          fi

          ln -sfn "$release" "$HK_TARGET_DIR"
          nginx -t
          systemctl reload nginx

          find "$HK_RELEASES_DIR" -mindepth 1 -maxdepth 1 -type d | sort | head -n -5 | xargs -r rm -rf
          rm -f /tmp/ai-dca-frontend.tgz
          REMOTE

      - name: Verify production
        run: |
          set -euo pipefail
          curl -fsSI --max-time 15 https://freebacktrack.tech/ | sed -n '1,20p'
          curl -fsS --max-time 15 https://freebacktrack.tech/?tab=markets >/tmp/freebacktrack-home.html
          grep -q '<title>美股策略助手</title>' /tmp/freebacktrack-home.html
