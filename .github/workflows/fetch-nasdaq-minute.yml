name: Fetch Nasdaq ETF Minute Bars

on:
  workflow_dispatch:
    inputs:
      target_date:
        description: "Target date in Asia/Shanghai, format YYYY-MM-DD"
        required: false
        type: string
  schedule:
    # 北京时间 15:30（收盘那一刻）：抓当日分钟线 / 日线 / 基准。
    - cron: "30 7 * * 1-5"
    # 北京时间次日 09:00（开盘前）：单独补抓昨日单位净值——场内 ETF 单位净值
    # 由基金公司 T 日晚 17:00-20:00 公布，15:30 cron 永远只能拿 T-1 的，需要这条补抓
    # 才能让 latest-nav.json 在次日开盘前就更新到 T-1 收盘净值。
    - cron: "0 1 * * 2-6"

permissions:
  contents: write

jobs:
  fetch-minute-bars:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-nasdaq-minute.txt

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-nasdaq-minute.txt

      - name: Resolve target date
        shell: bash
        run: |
          if [ -n "${{ inputs.target_date }}" ]; then
            echo "TARGET_DATE=${{ inputs.target_date }}" >> "$GITHUB_ENV"
          else
            echo "TARGET_DATE=$(TZ=Asia/Shanghai date +%F)" >> "$GITHUB_ENV"
          fi

      - name: Fetch minute bars
        run: python scripts/fetch_nasdaq_etf_minute.py --target-date "${TARGET_DATE}" --skip-existing

      - name: Refresh ETF daily bars
        run: node scripts/fetch_nasdaq_etf_daily_sina.mjs --lookback-days 730

      - name: Refresh Nasdaq 100 benchmark bars
        run: python scripts/fetch_nasdaq100_benchmark.py

      - name: Refresh ETF latest unit NAV (eastmoney lsjz)
        run: node scripts/fetch_etf_latest_nav.mjs

      - name: Sync data to docs
        shell: bash
        run: rsync -a data/ docs/data/ --exclude 'holdings-nav-cache'

      - name: Commit and push data updates
        shell: bash
        run: |
          # docs/data/ 被 .gitignore 忽略（本地 UX），但 Actions 是唯一写入者，用 -f 强制提交。
          git add data/
          git add -f docs/data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "data: refresh nasdaq market datasets for ${TARGET_DATE}"
          # 防止人工/其他 workflow 在期间推了 commit 造成 non-fast-forward。
          # 拉远端变化 -> rebase 本质就是把本次数据 refresh commit 接到最新 main 上。
          for attempt in 1 2 3; do
            git pull --rebase origin main || true
            if git push; then
              echo "push ok on attempt $attempt"
              exit 0
            fi
            echo "push attempt $attempt failed, retrying..." >&2
            sleep 5
          done
          echo "push failed after 3 attempts" >&2
          exit 1
