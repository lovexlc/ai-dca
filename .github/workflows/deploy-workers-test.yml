name: Deploy test-path Workers

on:
  push:
    branches:
      - test/new-sync-flow
    paths:
      - 'workers/sync/**'
      - 'workers/notify/**'
      - 'workers/markets/**'
      - 'workers/markets-agent/**'
      - 'workers/ocr-proxy/**'
      - 'scripts/check_nav_access.mjs'
      - '.github/workflows/deploy-workers-test.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-test-path-workers
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js for test markets-agent
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install test markets-agent deps
        working-directory: workers/markets-agent
        run: npm install --no-audit --no-fund

      - name: Deploy test markets-agent Worker
        uses: cloudflare/wrangler-action@v3
        with:
          workingDirectory: workers/markets-agent
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: deploy --config wrangler.test.toml

      - name: Deploy test markets Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: deploy --config workers/markets/wrangler.test.toml

      - name: Check NAV access boundaries
        run: node scripts/check_nav_access.mjs

      - name: Deploy test OCR Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: deploy --config workers/ocr-proxy/wrangler.test.toml

      - name: Deploy test sync Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: deploy --config workers/sync/wrangler.test.toml

      - name: Deploy test notify Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          command: deploy --config workers/notify/wrangler.test.toml
