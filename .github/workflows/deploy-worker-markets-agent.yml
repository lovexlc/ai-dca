name: Deploy markets-agent worker

on:
  push:
    branches:
      - main
    paths:
      - 'workers/markets-agent/**'
      - '.github/workflows/deploy-worker-markets-agent.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-worker-markets-agent
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install deps
        working-directory: workers/markets-agent
        run: npm install --no-audit --no-fund

      - name: Check NAV access boundaries
        run: node scripts/check_nav_access.mjs

      - name: Deploy markets-agent via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4'
          workingDirectory: workers/markets-agent
          command: deploy

      - name: Print deployment summary
        if: always()
        run: |
          echo "### markets-agent worker deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: ${GITHUB_SHA}" >> "$GITHUB_STEP_SUMMARY"
          echo "Workflow: ${GITHUB_WORKFLOW}" >> "$GITHUB_STEP_SUMMARY"
