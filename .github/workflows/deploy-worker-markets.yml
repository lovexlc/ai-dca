name: Deploy markets worker

on:
  push:
    branches:
      - main
    paths:
      - 'workers/markets/**'
      - '.github/workflows/deploy-worker-markets.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-worker-markets
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Deploy markets worker via Wrangler
        id: wrangler_deploy
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3'
          command: deploy --config workers/markets/wrangler.toml

      - name: Print deployment summary
        if: always()
        run: |
          echo "### markets worker deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "Commit: ${GITHUB_SHA}" >> "$GITHUB_STEP_SUMMARY"
          echo "Workflow: ${GITHUB_WORKFLOW}" >> "$GITHUB_STEP_SUMMARY"
