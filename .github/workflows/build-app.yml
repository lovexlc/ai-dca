name: Build App

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.*"
      - ".github/workflows/build-app.yml"
  pull_request:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "scripts/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.*"
      - ".github/workflows/build-app.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: build-app
  cancel-in-progress: true

jobs:
  build:
    name: Frontend build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build app
        run: npm run build:app
