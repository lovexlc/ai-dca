name: Deploy test frontend

on:
  push:
    branches:
      - test
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'scripts/check_refactor_guard.mjs'
      - '.github/workflows/deploy-test-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: test-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: test
      url: https://test.freebacktrack.tech

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check refactor guard
        run: npm run check:refactor

      - name: Build test frontend
        run: >-
          VITE_API_ORIGIN=https://test.freebacktrack.tech
          VITE_MARKETS_API_ORIGIN=https://test.freebacktrack.tech
          VITE_NOTIFY_API_ORIGIN=https://test.freebacktrack.tech
          VITE_SYNC_API_ORIGIN=https://test.freebacktrack.tech
          VITE_OUT_DIR=.frontend-build npx vite build
        env:
          VITE_POSTHOG_API_KEY: ${{ secrets.VITE_POSTHOG_API_KEY }}
          VITE_POSTHOG_HOST: https://us.i.posthog.com

      - name: Deploy Pages project
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '3'
          command: pages deploy .frontend-build --project-name ai-dca-test

      - name: Verify test frontend
        run: |
          set -euo pipefail
          curl -fsSI --max-time 20 https://test.freebacktrack.tech/
          curl -fsS --max-time 20 https://test.freebacktrack.tech/?tab=fundSwitch >/tmp/ai-dca-test-home.html
          grep -q '<title>美股策略助手</title>' /tmp/ai-dca-test-home.html
