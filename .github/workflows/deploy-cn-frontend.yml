name: Deploy CN Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'vite.config.js'
      - 'scripts/check_refactor_guard.mjs'
      - '.github/workflows/deploy-cn-frontend.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cn-frontend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production-cn
      url: https://cn.freebacktrack.tech:5000

    env:
      CN_HOST: rdfo1495558.bohrium.tech
      CN_VERIFY_IP: 47.92.221.14
      CN_USER: root
      CN_TARGET_DIR: /var/www/ai-dca-cn
      CN_RELEASES_DIR: /var/www/ai-dca-cn-releases

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check refactor guard
        run: npm run check:refactor

      - name: Build frontend
        run: npm run build:app
        env:
          VITE_POSTHOG_API_KEY: ${{ secrets.VITE_POSTHOG_API_KEY }}
          VITE_POSTHOG_HOST: https://us.i.posthog.com

      - name: Package frontend
        run: tar -C .frontend-build -czf /tmp/ai-dca-frontend.tgz .

      - name: Configure SSH
        env:
          CN_SSH_KEY: ${{ secrets.CN_SSH_KEY }}
        run: |
          set -euo pipefail
          test -n "$CN_HOST"
          test -n "$CN_USER"
          test -n "$CN_SSH_KEY"
          install -d -m 700 ~/.ssh
          printf '%s\n' "$CN_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "$CN_HOST" >> ~/.ssh/known_hosts

      - name: Upload artifact
        run: |
          set -euo pipefail
          scp -O \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            /tmp/ai-dca-frontend.tgz "$CN_USER@$CN_HOST:/tmp/ai-dca-frontend.tgz"

      - name: Deploy on CN host
        run: |
          set -euo pipefail
          ssh \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            "$CN_USER@$CN_HOST" \
            "CN_TARGET_DIR='$CN_TARGET_DIR' CN_RELEASES_DIR='$CN_RELEASES_DIR' bash -s" <<'REMOTE'
          set -euo pipefail
          stamp=$(date +%Y%m%d%H%M%S)
          release="$CN_RELEASES_DIR/$stamp"

          install -d -m 755 "$CN_RELEASES_DIR"
          install -d -m 755 "$release"
          tar -xzf /tmp/ai-dca-frontend.tgz -C "$release"

          if id www-data >/dev/null 2>&1; then
            chown -R www-data:www-data "$release"
          fi

          if [ -d "$CN_TARGET_DIR" ] && [ ! -L "$CN_TARGET_DIR" ]; then
            mv "$CN_TARGET_DIR" "$CN_TARGET_DIR.backup.$stamp"
          fi

          ln -sfn "$release" "$CN_TARGET_DIR"
          nginx -t
          nginx -s reload

          find "$CN_RELEASES_DIR" -mindepth 1 -maxdepth 1 -type d | sort | head -n -5 | xargs -r rm -rf
          rm -f /tmp/ai-dca-frontend.tgz
          REMOTE

      - name: Verify CN production
        run: |
          set -euo pipefail
          ssh \
            -o ServerAliveInterval=15 \
            -o ServerAliveCountMax=4 \
            "$CN_USER@$CN_HOST" \
            bash -s <<'REMOTE'
          set -euo pipefail
          curl --retry 5 --retry-delay 2 --retry-all-errors -fsSI --max-time 20 --resolve cn.freebacktrack.tech:5000:127.0.0.1 https://cn.freebacktrack.tech:5000/ | sed -n '1,20p'
          curl --retry 5 --retry-delay 2 --retry-all-errors -fsS --max-time 30 --resolve cn.freebacktrack.tech:5000:127.0.0.1 https://cn.freebacktrack.tech:5000/ >/tmp/freebacktrack-cn-home.html
          grep -q '<title>美股策略助手</title>' /tmp/freebacktrack-cn-home.html
          curl --retry 5 --retry-delay 2 --retry-all-errors -fsSI --max-time 20 --resolve cn.freebacktrack.tech:5000:127.0.0.1 https://cn.freebacktrack.tech:5000/markets | sed -n '1,20p'
          REMOTE

          if ! curl --retry 3 --retry-delay 2 --retry-all-errors -fsSI --max-time 20 --resolve cn.freebacktrack.tech:5000:$CN_VERIFY_IP https://cn.freebacktrack.tech:5000/ | sed -n '1,20p'; then
            echo "::warning::GitHub runner could not complete an external HEAD request to cn.freebacktrack.tech:5000, but SSH local HTTPS verification passed."
          fi
