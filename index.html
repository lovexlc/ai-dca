<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light only" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="supported-color-schemes" content="light" />
    <link rel="preconnect" href="https://api.freebacktrack.tech" crossorigin />
    <link rel="dns-prefetch" href="https://api.freebacktrack.tech" />
    <link rel="preconnect" href="https://qt.gtimg.cn" crossorigin />
    <link rel="dns-prefetch" href="https://qt.gtimg.cn" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%236366f1'/><stop offset='1' stop-color='%23a855f7'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='url(%23g)'/><path d='M12 42 L22 32 L32 38 L44 22 L52 26' stroke='white' stroke-width='4' stroke-linecap='round' stroke-linejoin='round' fill='none'/><circle cx='52' cy='26' r='3.5' fill='%23fbbf24'/></svg>" />
    <title>美股策略助手</title>
    <style>
      @keyframes gf-progress {
        0%   { transform: translateX(-100%); width: 40%; }
        50%  { width: 60%; }
        100% { transform: translateX(260%); width: 40%; }
      }
      .gf-progress-bar { animation: gf-progress 1.4s ease-in-out infinite; }
      @keyframes boot-shimmer {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      /* Force light mode: prevent OPPO/ColorOS/Android forced-dark from inverting colors */
      :root { color-scheme: light; }
      html, body {
        background-color: #ffffff !important;
        color: #1f1f1f !important;
        forced-color-adjust: none;
        margin: 0;
      }
      .boot-shell {
        min-height: 100vh;
        background: #fff;
        color: #1f1f1f;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .boot-topbar {
        box-sizing: border-box;
        display: flex;
        height: 48px;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid #e5e7eb;
        padding: 0 16px;
      }
      .boot-logo {
        height: 28px;
        width: 28px;
        border-radius: 8px;
        background: linear-gradient(135deg, #6366f1, #a855f7);
      }
      .boot-brand {
        font-size: 15px;
        font-weight: 700;
      }
      .boot-page {
        min-width: 0;
        overflow: hidden;
        color: #475569;
        font-size: 14px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .boot-workspace {
        box-sizing: border-box;
        display: grid;
        gap: 20px;
        padding: 14px 16px 32px;
      }
      .boot-side {
        display: none;
      }
      .boot-main,
      .boot-side {
        min-width: 0;
      }
      .boot-title {
        height: 16px;
        width: 156px;
        margin-bottom: 12px;
      }
      .boot-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 72px;
        gap: 12px;
        align-items: center;
        border-bottom: 1px solid #edf0f2;
        padding: 12px 0;
      }
      .boot-line {
        height: 14px;
      }
      .boot-line-sm {
        height: 10px;
        margin-top: 7px;
        width: 58%;
      }
      .boot-num {
        height: 20px;
      }
      .boot-strip {
        height: 34px;
        margin-bottom: 10px;
      }
      .boot-pulse {
        position: relative;
        overflow: hidden;
        border-radius: 7px;
        background: #eef2f7;
      }
      .boot-pulse::after {
        position: absolute;
        inset: 0;
        content: "";
        transform: translateX(-100%);
        animation: boot-shimmer 1.4s ease-in-out infinite;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,.72), transparent);
      }
      @media (min-width: 1024px) {
        .boot-workspace {
          grid-template-columns: 280px minmax(0, 1fr);
          padding: 18px 24px 32px;
        }
        .boot-side {
          display: block;
        }
      }
      @media (prefers-color-scheme: dark) {
        html, body, #root {
          background-color: #ffffff !important;
          color: #1f1f1f !important;
        }
        * {
          forced-color-adjust: none;
        }
      }
    </style>
    <script type="module" src="/src/entry-screen.jsx"></script>
  </head>
  <body>
    <div id="root">
      <div class="boot-shell">
        <div class="boot-topbar">
          <div class="boot-logo"></div>
          <div class="boot-brand">美股策略助手</div>
          <div class="boot-page">/ 行情中心</div>
        </div>
        <div class="boot-workspace">
          <aside class="boot-side">
            <div class="boot-title boot-pulse"></div>
            <div class="boot-row"><div><div class="boot-line boot-pulse"></div><div class="boot-line-sm boot-pulse"></div></div><div class="boot-num boot-pulse"></div></div>
            <div class="boot-row"><div><div class="boot-line boot-pulse"></div><div class="boot-line-sm boot-pulse"></div></div><div class="boot-num boot-pulse"></div></div>
            <div class="boot-row"><div><div class="boot-line boot-pulse"></div><div class="boot-line-sm boot-pulse"></div></div><div class="boot-num boot-pulse"></div></div>
            <div class="boot-row"><div><div class="boot-line boot-pulse"></div><div class="boot-line-sm boot-pulse"></div></div><div class="boot-num boot-pulse"></div></div>
          </aside>
          <main class="boot-main">
            <div class="boot-strip boot-pulse"></div>
            <div class="boot-row"><div><div class="boot-line boot-pulse"></div><div class="boot-line-sm boot-pulse"></div></div><div class="boot-num boot-pulse"></div></div>
            <div class="boot-row"><div><div class="boot-line boot-pulse"></div><div class="boot-line-sm boot-pulse"></div></div><div class="boot-num boot-pulse"></div></div>
            <div class="boot-row"><div><div class="boot-line boot-pulse"></div><div class="boot-line-sm boot-pulse"></div></div><div class="boot-num boot-pulse"></div></div>
            <div class="boot-row"><div><div class="boot-line boot-pulse"></div><div class="boot-line-sm boot-pulse"></div></div><div class="boot-num boot-pulse"></div></div>
            <div class="boot-row"><div><div class="boot-line boot-pulse"></div><div class="boot-line-sm boot-pulse"></div></div><div class="boot-num boot-pulse"></div></div>
          </main>
        </div>
      </div>
    </div>
  </body>
</html>
